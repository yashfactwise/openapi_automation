<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The cURLer - API Request Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=3">

</head>

<body>
    <!--
        The cURLer - API cURL Request Generator
        
        Phase 1: Core infrastructure and UI skeleton
        - Environment management (IMPLEMENTED)
        - Account management (IMPLEMENTED)
        - Module/operation navigation (UI ONLY - all 22 operations visible)
        - Action buttons (Copy/Download work, Execute shows placeholder)
        - Response display (UI ready for Phase 2)
        
        Phase 2: Contract module full implementation
        Phase 3+: Other modules (PO, Items, Vendors, Projects, Costing Sheets)
        i
        Related specs: .kiro/specs/api-curl-generator-webapp/
    -->

    <div class="app-container">
        <!-- Sidebar: Navigation & Settings -->
        <aside class="sidebar">
            <div class="brand">
                <h1>⚡ The cURLer</h1>
            </div>

            <div class="sidebar-content">
                <!-- Environment Selector -->
                <section id="environment-section" class="sidebar-section">
                    <div class="section-label">Environment</div>
                    <div id="environment-selector"></div>
                </section>

                <!-- Account Manager -->
                <section id="account-section" class="sidebar-section">
                    <div class="section-label">Account</div>
                    <div id="account-manager"></div>
                </section>

                <!-- Module Navigator -->
                <section id="module-section" class="sidebar-section">
                    <div class="section-label">Modules</div>
                    <div id="module-navigator"></div>
                </section>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-bar hidden">
                <h2 class="current-operation">Select Operation</h2>
            </header>

            <div class="content-grid">
                <!-- Dashboard View -->
                <div id="dashboard-container" class="dashboard-container">
                    <!-- Dashboard content injected by JS -->
                </div>

                <!-- Operation View (Initially Hidden) -->
                <div id="operation-view" class="hidden">
                    <!-- Form Section -->
                    <section id="form-section" class="panel">
                        <div class="panel-header">
                            <h3>Parameters</h3>
                        </div>
                        <div id="operation-form" class="form-container">
                            <!-- Form injected by JS -->
                        </div>
                    </section>

                    <!-- Response Section (shown first, above curl) -->
                    <section id="response-section" class="panel response-panel hidden">
                        <div class="panel-header">
                            <h3>Response</h3>
                        </div>
                        <div id="response-display" class="code-block response-body">
                            <!-- Response injected by JS -->
                        </div>
                    </section>

                    <!-- cURL Display (collapsed by default after execute) -->
                    <div id="actions-section" class="panel output-panel hidden">
                        <div class="panel-header curl-panel-header" id="curl-panel-toggle" style="cursor:pointer;">
                            <h3 style="display:flex;align-items:center;gap:8px;">
                                <svg id="curl-collapse-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:#94a3b8;transition:transform 0.2s;transform:rotate(-90deg);flex-shrink:0;">
                                    <polyline points="6 9 12 15 18 9"></polyline>
                                </svg>
                                Generated cURL
                            </h3>
                            <div class="panel-actions">
                                <button id="btn-copy-curl-panel" class="btn-small">Copy</button>
                                <button id="btn-download-curl-panel" class="btn-small">Download</button>
                            </div>
                        </div>
                        <div id="curl-display" class="code-block" style="display:none;">
                            <!-- cURL injected here -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sticky Footer for Actions -->
            <div class="bottom-bar hidden">
                <button id="btn-reset" class="btn-secondary">Clear Form</button>
                <button id="btn-generate" class="btn-secondary">Generate cURL</button>
                <button id="btn-copy-script" class="btn-secondary hidden"
                    title="Copy bash curl script to clipboard">
                    📋 Copy Script
                </button>
                <button id="btn-execute-script" class="btn-secondary hidden"
                    title="Execute the bash curl script on the server">
                    ▶ Execute Script
                </button>
                <button id="btn-execute" class="btn-primary">Execute Request</button>
            </div>
        </main>
    </div>

    <!-- JavaScript Modules -->
    <!-- CommonJS/Global modules loaded as regular scripts -->
    <script src="js/factwise-integration.js?v=2"></script>
    <script src="js/environment-manager.js?v=2"></script>
    <script src="js/account-store.js?v=2"></script>
    <script src="js/token-manager.js?v=2"></script>
    <script src="js/module-registry.js?v=2"></script> <!-- Added -->
    <script src="js/payload-builder.js?v=2"></script>
    <script src="js/curl-generator.js?v=2"></script> <!-- Added -->
    <script src="js/api-client.js?v=2"></script>
    <script src="js/item-validator.js?v=2"></script> <!-- Item Validation -->
    <script src="js/item-validation-ui.js?v=2"></script> <!-- Item Validation UI -->
    <script src="js/template-manager.js?v=2"></script> <!-- Template Manager -->
    <script src="js/form-defaults.js?v=2"></script> <!-- Form Defaults -->
    <script src="js/ui-controller.js?v=3"></script>

    <!-- Main Application Entry Point -->
    <script src="js/main.js?v=3"></script>
</body>

</html>
